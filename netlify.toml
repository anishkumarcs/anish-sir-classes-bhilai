# ============================================
# NETLIFY CONFIG — STATIC EDUCATIONAL SITE (2026)
# ============================================

[build]
  publish = "."
  command = ""

# -------------------------------
# SECURITY HEADERS (GLOBAL)
# -------------------------------
[[headers]]
  for = "/*"

  [headers.values]
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline'; object-src 'none'; frame-ancestors 'none'"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# -------------------------------
# CACHE CONTROL
# -------------------------------
[[headers]]
  for = "/*.html"

  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.css"

  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# -------------------------------
# CLEAN URLS (OPTIONAL)
# -------------------------------
[build.processing]
  skip_processing = false

# -------------------------------
# DEPLOY CONTEXTS
# -------------------------------
[context.production]
  environment = { SITE_ENV = "production" }

[context.deploy-preview]
  environment = { SITE_ENV = "preview" }

[context.branch-deploy]
  environment = { SITE_ENV = "staging" }
